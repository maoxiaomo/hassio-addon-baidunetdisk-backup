name: "百度网盘备份 (Baidu Netdisk Backup)"
version: "1.2.7"
slug: "baidu_netdisk_backup"
description: "自动将 Home Assistant 备份文件上传到百度网盘 (正式版)"
url: "https://gitee.com/mxmaimooo/hassio-addon-baidunetdisk-backup"
startup: application
init: false
ingress: true
ingress_port: 8099
panel_icon: "mdi:cloud-upload"
panel_title: "百度网盘备份"
hassio_api: true
arch:
  - aarch64
  - amd64
  - armv7
  - armhf
  - i386
boot: auto
map:
  - "backup:rw"
options:
  refresh_token: ""
  upload_path: "/HomeAssistant/Backup"
  schedule: "0 5 * * *"
  # 远端备份分层保留策略
  retention:
    use_folders: true
    daily: 7
    weekly: 4
    monthly: 12
  # 通知配置 — 下方提供默认占位，实际值请按需填写
  notifications:
    enabled: true
    storage_warning_threshold: 0.9   # 存储空间告警阈值（0-1 小数，例如 0.9 表示已用 90% 时触发）
    events:
      backup_success: true
      backup_failure: true
      migration_done: false
      manifest_generated: false
      storage_warning: false
    channels:
      email:
        enabled: false
        smtp_host: ""
        smtp_port: 587
        username: ""
        password: ""
        to_emails: ""
        use_ssl: false
      wechat:
        enabled: false
        webhook_key: ""                # 企业微信群机器人 Webhook Key
      dingtalk:
        enabled: false
        webhook_url: ""                # 钉钉群机器人 Webhook 完整 URL
        secret: ""                     # 加签密钥（可选）
        at_all: false
        at_mobiles: []
      feishu:
        enabled: false
        webhook_url: ""                # 飞书群机器人 Webhook 完整 URL
        secret: ""                     # 签名校验密钥（可选）
schema:
  refresh_token: str
  upload_path: str?
  schedule: str?
  retention:
    use_folders: bool?
    daily: int?
    weekly: int?
    monthly: int?
  # 通知配置 schema
  notifications:
    enabled: bool?
    storage_warning_threshold: float?
    events:
      backup_success: bool?
      backup_failure: bool?
      migration_done: bool?
      manifest_generated: bool?
      storage_warning: bool?
    channels:
      email:
        enabled: bool?
        smtp_host: str?
        smtp_port: int?
        username: str?
        password: str?
        to_emails: str?
        use_ssl: bool?
      wechat:
        enabled: bool?
        webhook_key: str?
      dingtalk:
        enabled: bool?
        webhook_url: str?
        secret: str?
        at_all: bool?
        at_mobiles:
          - str?
      feishu:
        enabled: bool?
        webhook_url: str?
        secret: str?